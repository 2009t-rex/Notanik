<!DOCTYPE html>
<html lang="pl">
<head>

    <link rel="shortcut icon" id="webIcon" href="https://raw.githubusercontent.com/2009t-rex/Obrazy/refs/heads/main/DoomIcon/DoomF.webp" type="image/x-icon">

<body>

        <h2>Notanik</h2>

    </div>
    <script src="script.js"></script>
    <audio id="audio" src="audioTesting.mp3" loop></audio>
